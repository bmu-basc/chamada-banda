<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Efetivo da Banda</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light; }
    html, body { background:#ffffff !important; color:#222 !important; }
    body { font-family: -apple-system, Roboto, Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 20px; }
    h1, h3, label, .opcao, .titulo { color:#222 !important; }
    .campo { margin-bottom: 20px; }
    label.titulo { font-weight: 600; display: block; margin-bottom: 8px; }
    input[type=text], input[type=date] {
      width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 6px; color:#222 !important; background:#fff !important; }
    input[readonly] { background:#eee !important; color:#555 !important; }
    .dia { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 14px; }
    .dia h3 { margin: 0 0 8px; font-size: 16px; }
    .opcao { display: block; padding: 6px 0; font-size: 15px; }
    .opcao input { margin-right: 8px; transform: scale(1.2); }
    .outro-txt { margin-top: 6px; display: none; }
    .contador { font-size: 12px; color:#777; text-align:right; margin-top:2px; display:none; }
    #feriasBox { border:1px solid #2e7d32; border-radius:8px; padding:12px; margin-top:10px; margin-bottom:4px; display:none; }
    #feriasBox h3 { margin:0 0 10px; font-size:16px; }
    button { background: #2e7d32; color: #fff; border: none; padding: 14px; width: 100%; font-size: 16px; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #999; }
    #status { text-align: center; margin-top: 14px; font-weight: 600; }
    #erro { text-align:center; color:#c62828; font-weight:600; margin-top:40px; display:none; }
  </style>
</head>
<body>
  <h1>🎯 Efetivo da Banda — Disponibilidade</h1>
  <div id="cabecalhoSemana" style="color:#2e7d32;font-weight:600;margin-bottom:12px;"></div>

  <div id="formArea">
    <div class="campo">
      <label class="titulo">Graduação e nome</label>
      <input type="text" id="nome" readonly>
    </div>
    <div class="campo">
      <label class="titulo">Instrumento</label>
      <input type="text" id="instrumento" readonly>
    </div>

    <div id="dias"></div>

    <div id="feriasBox">
      <h3>🏖️ Período de Férias</h3>
      <label class="titulo">Início</label>
      <input type="date" id="feriasInicio">
      <label class="titulo" style="margin-top:10px;">Término</label>
      <input type="date" id="feriasFim">
    </div>

    <button id="enviar">Enviar</button>
    <div id="status"></div>
  </div>

  <div id="erro">Cadastro não encontrado. Fale com um administrador.</div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby5-TikOhEjNRmMFCKI_jClWV3ekPi7rk1amQ68D6MXAo1kwKh-Na72l4oRyHUGqBs0/exec';
    const LIMITE_OUTRO = 100;

    const DIAS = ['Segunda Feira', 'Terça Feira', 'Quarta Feira', 'Quinta Feira', 'Sexta Feira', 'Sábado', 'Domingo'];
    const OPCOES = ['Presente', 'Entrando de Serviço', 'Saindo de Serviço', 'Hospital', 'Férias', 'Outro'];

    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }

    const params = new URLSearchParams(location.search);
    const SEMANA = params.get('semana') === 'atual' ? 'atual' : 'proxima';
    document.getElementById('cabecalhoSemana').textContent =
      SEMANA === 'atual' ? 'Semana ATUAL' : 'Próxima semana';

    function getChatId() {
      const u = params.get('chatId');
      if (u) return u;
      if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) return String(tg.initDataUnsafe.user.id);
      return '';
    }

    // monta os 7 dias
    const cont = document.getElementById('dias');
    const diaDivs = [];
    DIAS.forEach(function (nomeDia, d) {
      const div = document.createElement('div');
      div.className = 'dia';
      div.id = 'diaBox' + d;
      let html = '<h3>📅 ' + nomeDia + '</h3>';
      OPCOES.forEach(function (op) {
        html += '<label class="opcao"><input type="checkbox" name="dia' + d + '" value="' + op + '"> ' + op + '</label>';
      });
      html += '<input type="text" class="outro-txt" id="outro' + d + '" maxlength="' + LIMITE_OUTRO +
              '" placeholder="Descreva o \'Outro\' (máx ' + LIMITE_OUTRO + ')...">';
      html += '<div class="contador" id="cont' + d + '"></div>';
      div.innerHTML = html;
      cont.appendChild(div);
      diaDivs[d] = div;
    });

    // entrando de serviço -> marca saindo no dia seguinte (dentro da semana; domingo cruza semana = Etapa 4)
    function syncEntrandoSaindo(cb) {
      if (cb.value !== 'Entrando de Serviço') return;
      const d = parseInt(cb.name.replace('dia', ''), 10);
      const prox = d + 1;
      if (prox >= DIAS.length) return;
      const saindo = document.querySelector('input[name="dia' + prox + '"][value="Saindo de Serviço"]');
      if (saindo) saindo.checked = cb.checked;
    }

    function atualizarFerias() {
      const feriasBox = document.getElementById('feriasBox');
      let primeiro = -1;
      for (let d = 0; d < DIAS.length; d++) {
        if (document.querySelector('input[name="dia' + d + '"][value="Férias"]:checked')) { primeiro = d; break; }
      }
      if (primeiro === -1) { feriasBox.style.display = 'none'; }
      else { diaDivs[primeiro].appendChild(feriasBox); feriasBox.style.display = 'block'; }
    }

    document.querySelectorAll('input[type=checkbox]').forEach(function (cb) {
      cb.addEventListener('change', function () {
        if (cb.value === 'Outro') {
          const d = cb.name.replace('dia', '');
          const campo = document.getElementById('outro' + d);
          const c = document.getElementById('cont' + d);
          campo.style.display = cb.checked ? 'block' : 'none';
          c.style.display = cb.checked ? 'block' : 'none';
          c.textContent = campo.value.length + '/' + LIMITE_OUTRO;
        }
        syncEntrandoSaindo(cb);
        atualizarFerias();
      });
    });

    for (let d = 0; d < DIAS.length; d++) {
      (function (d) {
        const o = document.getElementById('outro' + d);
        const c = document.getElementById('cont' + d);
        o.addEventListener('input', function () { c.textContent = o.value.length + '/' + LIMITE_OUTRO; });
      })(d);
    }

    // ----- PREFILL via JSONP -----
    function carregarPrefill() {
      const chatId = getChatId();
      if (!chatId) { mostrarErro(); return; }
      const s = document.createElement('script');
      s.src = GAS_URL + '?action=get&chatId=' + encodeURIComponent(chatId) +
              '&semana=' + SEMANA + '&callback=preencher&_=' + Date.now();
      document.body.appendChild(s);
    }

    function mostrarErro() {
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('erro').style.display = 'block';
    }

    window.preencher = function (data) {
      if (!data) { mostrarErro(); return; } // não vinculado ao roster
      document.getElementById('nome').value = data.nome || '';
      document.getElementById('instrumento').value = data.instrumento || '';
      (data.dias || []).forEach(function (valorDia, d) {
        if (valorDia) marcarDia(d, valorDia);
      });
      atualizarFerias();
    };

    function marcarDia(d, valor) {
      const txt0 = String(valor).trim();
      if (txt0 === '' || txt0.toLowerCase() === 'xxxx') return; // placeholder de fim de semana
      const partes = txt0.split(', ');
      for (let i = 0; i < partes.length; i++) {
        const tok = partes[i];
        if (tok.indexOf('Outro') === 0) {
          const t = partes.slice(i).join(', ').replace(/^Outro:?\s*/, '');
          const cbOutro = document.querySelector('input[name="dia' + d + '"][value="Outro"]');
          if (cbOutro) cbOutro.checked = true;
          const campo = document.getElementById('outro' + d);
          const c = document.getElementById('cont' + d);
          if (campo) { campo.value = t; campo.style.display = 'block'; }
          if (c) { c.style.display = 'block'; c.textContent = t.length + '/' + LIMITE_OUTRO; }
          break;
        } else {
          document.querySelectorAll('input[name="dia' + d + '"]').forEach(function (cb) {
            if (cb.value === tok) cb.checked = true;
          });
        }
      }
    }

    carregarPrefill();

    document.getElementById('enviar').addEventListener('click', enviar);

    async function enviar() {
      const status = document.getElementById('status');

      let feriasInicio = '', feriasFim = '';
      if (document.getElementById('feriasBox').style.display === 'block') {
        feriasInicio = document.getElementById('feriasInicio').value;
        feriasFim = document.getElementById('feriasFim').value;
        if (!feriasInicio || !feriasFim) { status.textContent = '⚠️ Informe início e término das férias.'; return; }
        if (feriasFim < feriasInicio) { status.textContent = '⚠️ O término não pode ser antes do início.'; return; }
      }

      const dias = [];
      for (let d = 0; d < DIAS.length; d++) {
        const marcadas = [];
        document.querySelectorAll('input[name="dia' + d + '"]:checked').forEach(function (cb) {
          if (cb.value === 'Outro') {
            const t = document.getElementById('outro' + d).value.trim();
            marcadas.push(t ? 'Outro: ' + t : 'Outro');
          } else { marcadas.push(cb.value); }
        });
        let valor = marcadas.join(', ');
        // Sábado(5)/Domingo(6) em branco -> mantém o placeholder xxxx
        if (!valor && (d === 5 || d === 6)) valor = 'xxxx';
        dias.push(valor);
      }

      const payload = { chatId: getChatId(), semana: SEMANA, dias: dias, feriasInicio: feriasInicio, feriasFim: feriasFim };

      const btn = document.getElementById('enviar');
      btn.disabled = true;
      status.textContent = 'Enviando...';
      try {
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        status.textContent = '✅ Resposta enviada!';
        if (tg) setTimeout(function () { tg.close(); }, 1200);
      } catch (e) {
        btn.disabled = false;
        status.textContent = '❌ Erro ao enviar. Tente de novo.';
      }
    }
  </script>
</body>
</html>
